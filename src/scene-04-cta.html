<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 4 - CTA Outro</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Press Start 2P', monospace; }
canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
#bg { z-index: 1; }
#main { z-index: 2; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="main"></canvas>
<script>
const DURATION = 7;
const bgCanvas = document.getElementById('bg');
const mainCanvas = document.getElementById('main');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');
let W, H;

function resize() {
    W = window.W || window.innerWidth; H = window.H || window.innerHeight;
    bgCanvas.width = W; bgCanvas.height = H;
    mainCanvas.width = W; mainCanvas.height = H;
}
resize();
window.resize = resize;
window.addEventListener('resize', resize);

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInCubic(t) { return t * t * t; }

function drawCircuitGrid(t) {
    bgCtx.fillStyle = '#0D3D4B';
    bgCtx.fillRect(0, 0, W, H);
    const gridSize = 40;
    bgCtx.strokeStyle = 'rgba(0,212,170,0.08)';
    bgCtx.lineWidth = 1;
    for (let x = 0; x < W; x += gridSize) {
        bgCtx.beginPath(); bgCtx.moveTo(x, 0); bgCtx.lineTo(x, H); bgCtx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
        bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(W, y); bgCtx.stroke();
    }
    bgCtx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let y = 0; y < H; y += 3) bgCtx.fillRect(0, y, W, 1);
}

function drawPixelStar(cx, cy, size, alpha) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00d4aa';
    const s = size;
    ctx.fillRect(cx - s/2, cy - s, s, s*2);
    ctx.fillRect(cx - s, cy - s/2, s*2, s);
}

function drawFrame(t) {
    ctx.clearRect(0, 0, W, H);
    drawCircuitGrid(t);

    // All elements centered as a vertical group
    // Total group: box (~300px) + gap(40) + CTA(60) + gap(20) + URL(~20) = ~440px
    // Center that group in the viewport
    const groupH = 420;
    const groupTop = H/2 - groupH/2;

    // Box art
    if (window.imageReady && boxImg && boxImg.complete && boxImg.naturalWidth > 0) {
        const boxW = Math.min(W * 0.18, 200);
        const boxH = boxW * 1.5;
        const boxX = W/2 - boxW/2;
        const boxY = groupTop + Math.sin(t * 0.5) * 5;

        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(boxX + 6, boxY + 6, boxW, boxH);
        ctx.drawImage(boxImg, boxX, boxY, boxW, boxH);
        ctx.strokeStyle = '#00d4aa';
        ctx.lineWidth = 3;
        ctx.strokeRect(boxX - 2, boxY - 2, boxW + 4, boxH + 4);
    }

    // DOWNLOAD NOW CTA
    if (t > 0.5 && t < 6) {
        const fadeIn = easeOutCubic(Math.min((t - 0.5) / 0.6, 1));
        const fadeOut = t > 5 ? Math.max(0, 1 - (t - 5) / 1) : 1;
        const alpha = fadeIn * fadeOut;

        ctx.globalAlpha = alpha;

        const ctaW = Math.min(W * 0.40, 460);
        const ctaH = 56;
        const ctaX = W/2 - ctaW/2;
        const ctaY = groupTop + 320;

        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(ctaX + 4, ctaY + 4, ctaW, ctaH);
        ctx.fillStyle = '#C86F22';
        ctx.fillRect(ctaX, ctaY, ctaW, ctaH);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.strokeRect(ctaX, ctaY, ctaW, ctaH);

        const ctaSize = Math.min(W * 0.016, 20);
        ctx.font = `900 ${ctaSize}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.fillText('DOWNLOAD NOW', W/2, ctaY + ctaH/2);
    }

    // URL
    if (t > 1.2 && t < 6) {
        const fadeIn = easeOutCubic(Math.min((t - 1.2) / 0.5, 1));
        const fadeOut = t > 5 ? Math.max(0, 1 - (t - 5) / 1) : 1;
        ctx.globalAlpha = fadeIn * fadeOut;

        const urlSize = Math.min(W * 0.011, 13);
        ctx.font = `400 ${urlSize}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#7FFFD4';
        ctx.shadowColor = '#7FFFD4';
        ctx.shadowBlur = 10;
        ctx.fillText('www.opencrabs.com', W/2, groupTop + 400);
        ctx.shadowBlur = 0;
    }

    // Pixel stars floating around
    const starSize = Math.min(W * 0.006, 8);
    for (let i = 0; i < 8; i++) {
        const angle = (t * 0.3) + (i * Math.PI * 2 / 8);
        const radius = W * 0.28;
        const sx = W/2 + Math.cos(angle) * radius;
        const sy = H/2 + Math.sin(angle) * radius * 0.5;
        const flicker = 0.3 + Math.sin(t * 2 + i) * 0.3;
        drawPixelStar(sx, sy, starSize, flicker);
    }

    // v0.3.17 version label — inside a top border bar, clean
    if (t > 0.3 && t < 6) {
        const a = easeOutCubic(Math.min((t - 0.3) / 0.4, 1)) * (t > 5 ? Math.max(0, 1 - (t - 5) / 1) : 1);
        ctx.globalAlpha = a;

        const barW = Math.min(W * 0.22, 260);
        const barH = 30;
        const barX = W/2 - barW/2;
        const barY = H * 0.06;

        ctx.fillStyle = '#1E2021';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.strokeStyle = '#C86F22';
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY, barW, barH);

        const lblSize = Math.min(W * 0.01, 12);
        ctx.font = `700 ${lblSize}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#C86F22';
        ctx.fillText('v0.3.17', W/2, barY + barH/2);
    }

    // Fade to black
    if (t > 5) {
        const fadeA = easeInCubic(Math.min((t - 5) / 2, 1));
        ctx.globalAlpha = fadeA;
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, W, H);
    }

    ctx.globalAlpha = 1;
}

window.imageReady = false;

const boxImg = new Image();
boxImg.id = 'boxImg';
boxImg.src = 'assets/retro-game-opencrabs.png';
boxImg.onload = () => { window.imageReady = true; };
boxImg.onerror = () => { window.imageReady = false; };

// Export-driven rendering: export script calls window.renderFrame(t) with exact time
window.renderFrame = function(t) {
    drawFrame(Math.min(t, DURATION));
};
window.DURATION = DURATION;
</script>
</body>
</html>
