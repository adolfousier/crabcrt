<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCrabs Signal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const text1 = 'OPENCRABS';
const text2 = 'v0.3.14 JUST DROPPED';
const text3Line1 = 'DOWNLOAD NOW';
const text3Line2 = 'www.opencrabs.com';
const highlights = [
    ['🛡️', 'Provider resilience', '5xx retry, proxy unwrap, 401 fix'],
    ['🔀', 'Per-session isolation', 'model swaps never bleed'],
    ['🧠', 'Self-healing expanded', '49 phantom patterns caught'],
    ['🔊', 'Voicebox TTS', 'new engine in onboarding'],
    ['💭', 'Thinking column', 'reasoning stored separately'],
    ['📊', 'Usage dashboard', 'centralized pricing, GLM + Kimi'],
    ['✨', 'Kimi reasoning', 'thinking mode without 400s'],
    ['🧪', '2,145 tests', '+14 from last release']
];
const noiseCanvas = document.createElement('canvas');
const nctx = noiseCanvas.getContext('2d');

function renderNoise(intensity) {
    noiseCanvas.width = W; noiseCanvas.height = H;
    const imgData = nctx.createImageData(W, H);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255 * intensity;
        d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
    }
    nctx.putImageData(imgData, 0, 0);
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

function drawText(text, alpha, tremble, fontSize) {
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(Math.random() * tremble - tremble/2, Math.random() * tremble - tremble/2);

    const textCanvas = document.createElement('canvas');
    textCanvas.width = W; textCanvas.height = H;
    const tctx = textCanvas.getContext('2d');
    tctx.font = `900 ${fontSize}px monospace`;
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.fillStyle = '#fff';
    tctx.fillText(text, W/2, H/2);

    const tData = tctx.getImageData(0, 0, W, H);
    const td = tData.data;
    for (let i = 0; i < td.length; i += 4) {
        if (td[i] > 128) {
            const grain = Math.random() * 60 + 140;
            td[i] = td[i+1] = td[i+2] = grain;
        } else {
            td[i+3] = 0;
        }
    }
    tctx.putImageData(tData, 0, 0);

    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 15;
    ctx.drawImage(textCanvas, 0, 0);

    if (alpha > 0.5) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.shadowBlur = 0;
        const offset = (1 - alpha) * 8 + 2;
        ctx.drawImage(textCanvas, -offset, 0);
        ctx.drawImage(textCanvas, offset, 0);
    }
    ctx.restore();
}

function drawTwoLineText(line1, line2, alpha, tremble, fontSize) {
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(Math.random() * tremble - tremble/2, Math.random() * tremble - tremble/2);

    const textCanvas = document.createElement('canvas');
    textCanvas.width = W; textCanvas.height = H;
    const tctx = textCanvas.getContext('2d');
    tctx.font = `900 ${fontSize}px monospace`;
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.fillStyle = '#fff';
    const lineGap = fontSize * 1.3;
    tctx.fillText(line1, W/2, H/2 - lineGap/2);
    tctx.fillText(line2, W/2, H/2 + lineGap/2);

    const tData = tctx.getImageData(0, 0, W, H);
    const td = tData.data;
    for (let i = 0; i < td.length; i += 4) {
        if (td[i] > 128) {
            const grain = Math.random() * 60 + 140;
            td[i] = td[i+1] = td[i+2] = grain;
        } else {
            td[i+3] = 0;
        }
    }
    tctx.putImageData(tData, 0, 0);

    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 15;
    ctx.drawImage(textCanvas, 0, 0);

    if (alpha > 0.5) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.shadowBlur = 0;
        const offset = (1 - alpha) * 8 + 2;
        ctx.drawImage(textCanvas, -offset, 0);
        ctx.drawImage(textCanvas, offset, 0);
    }
    ctx.restore();
}

function drawCreditsRoll(items, alpha, tremble, phaseTime) {
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(Math.random() * tremble - tremble/2, Math.random() * tremble - tremble/2);

    const textCanvas = document.createElement('canvas');
    textCanvas.width = W; textCanvas.height = H;
    const tctx = textCanvas.getContext('2d');

    const iconSize = Math.min(W * 0.045, 56);
    const titleSize = Math.min(W * 0.032, 40);
    const descSize = Math.min(W * 0.022, 28);
    const itemSpacing = iconSize * 3.5;
    const totalHeight = items.length * itemSpacing;
    const scrollSpeed = 160;
    const scrollOffset = (phaseTime / 1000) * scrollSpeed;

    for (let i = 0; i < items.length; i++) {
        let y = H * 0.85 + i * itemSpacing - scrollOffset;
        while (y < -itemSpacing) y += totalHeight;
        if (y < -itemSpacing || y > H + itemSpacing) continue;

        const cx = W / 2;

        tctx.fillStyle = '#fff';
        tctx.font = `900 ${iconSize}px monospace`;
        tctx.textAlign = 'center';
        tctx.textBaseline = 'top';
        tctx.fillText(items[i][0], cx, y);

        tctx.fillStyle = '#fff';
        tctx.font = `700 ${titleSize}px monospace`;
        tctx.fillText(items[i][1], cx, y + iconSize * 1.2);

        tctx.fillStyle = 'rgba(255,255,255,0.75)';
        tctx.font = `400 ${descSize}px monospace`;
        tctx.fillText(items[i][2], cx, y + iconSize * 1.2 + titleSize * 1.5);
    }

    const tData = tctx.getImageData(0, 0, W, H);
    const td = tData.data;
    for (let i = 0; i < td.length; i += 4) {
        if (td[i] > 128) {
            const grain = Math.random() * 60 + 140;
            td[i] = td[i+1] = td[i+2] = grain;
        } else {
            td[i+3] = 0;
        }
    }
    tctx.putImageData(tData, 0, 0);

    ctx.shadowColor = 'rgba(255,255,255,0.4)';
    ctx.shadowBlur = 12;
    ctx.drawImage(textCanvas, 0, 0);

    if (alpha > 0.5) {
        ctx.globalAlpha = alpha * 0.25;
        ctx.shadowBlur = 0;
        const offset = (1 - alpha) * 6 + 2;
        ctx.drawImage(textCanvas, -offset, 0);
        ctx.drawImage(textCanvas, offset, 0);
    }
    ctx.restore();
}

const CYCLE = 36000;
let start = performance.now();

function draw(t) {
    const cycle = (t - start) % CYCLE;
    const phase = cycle / CYCLE;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    let noiseLevel = 1;
    let activeText = null;
    let activeTwoLine = false;
    let activeGrid = false;
    let textAlpha = 0;
    let textTremble = 0;
    let fontSize = Math.min(W * 0.1, 120);

    // Phase 1: OPENCRABS (0s - 9s)
    if (phase < 0.040) {
        noiseLevel = 1;
    } else if (phase < 0.100) {
        const p = (phase - 0.040) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeText = text1;
        textAlpha = e;
        textTremble = (1 - e) * 15;
        fontSize = Math.min(W * 0.1, 120);
    } else if (phase < 0.190) {
        noiseLevel = 0.15;
        activeText = text1;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
        fontSize = Math.min(W * 0.1, 120);
    } else if (phase < 0.250) {
        const p = (phase - 0.190) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeText = text1;
        textAlpha = 1 - e;
        textTremble = e * 20;
        fontSize = Math.min(W * 0.1, 120);
    }
    // Phase 2: v0.3.14 JUST DROPPED (9s - 18s)
    else if (phase < 0.290) {
        noiseLevel = 1;
    } else if (phase < 0.350) {
        const p = (phase - 0.290) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeText = text2;
        textAlpha = e;
        textTremble = (1 - e) * 15;
        fontSize = Math.min(W * 0.07, 80);
    } else if (phase < 0.440) {
        noiseLevel = 0.15;
        activeText = text2;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
        fontSize = Math.min(W * 0.07, 80);
    } else if (phase < 0.500) {
        const p = (phase - 0.440) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeText = text2;
        textAlpha = 1 - e;
        textTremble = e * 20;
        fontSize = Math.min(W * 0.07, 80);
    }
    // Phase 3: Highlights credits roll (18s - 27s)
    else if (phase < 0.540) {
        noiseLevel = 1;
    } else if (phase < 0.600) {
        const p = (phase - 0.540) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeGrid = true;
        textAlpha = e;
        textTremble = (1 - e) * 15;
    } else if (phase < 0.690) {
        noiseLevel = 0.15;
        activeGrid = true;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
    } else if (phase < 0.750) {
        const p = (phase - 0.690) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeGrid = true;
        textAlpha = 1 - e;
        textTremble = e * 20;
    }
    // Phase 4: Get it now / www.opencrabs.com (27s - 36s)
    else if (phase < 0.790) {
        noiseLevel = 1;
    } else if (phase < 0.850) {
        const p = (phase - 0.790) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeTwoLine = true;
        textAlpha = e;
        textTremble = (1 - e) * 15;
        fontSize = Math.min(W * 0.07, 80);
    } else if (phase < 0.940) {
        noiseLevel = 0.15;
        activeTwoLine = true;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
        fontSize = Math.min(W * 0.07, 80);
    } else {
        const p = (phase - 0.940) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeTwoLine = true;
        textAlpha = 1 - e;
        textTremble = e * 20;
        fontSize = Math.min(W * 0.07, 80);
    }

    renderNoise(noiseLevel);
    ctx.drawImage(noiseCanvas, 0, 0);

    if (activeGrid) {
        const phase3Time = Math.max(0, phase - 0.540) * CYCLE;
        drawCreditsRoll(highlights, textAlpha, textTremble, phase3Time);
    } else if (activeTwoLine) {
        drawTwoLineText(text3Line1, text3Line2, textAlpha, textTremble, fontSize);
    } else if (activeText) {
        drawText(activeText, textAlpha, textTremble, fontSize);
    }

    for (let y = 0; y < H; y += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, y, W, 2);
    }

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    const grad = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, W*0.8);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    if (Math.random() < 0.05) {
        const gy = Math.random() * H;
        const gh = Math.random() * 40 + 10;
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(0, gy, W, gh);
    }

    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
