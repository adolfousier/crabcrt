<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCrabs Signal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<audio id="sfx" src="assets/opencrabs-release.wav" preload="auto"></audio>
<div id="start-overlay" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font:900 24px monospace;cursor:pointer;z-index:10;">CLICK TO START</div>
<button id="export-btn" style="position:fixed;bottom:20px;right:20px;z-index:20;background:#222;color:#fff;border:1px solid #555;padding:8px 16px;font:700 14px monospace;cursor:pointer;border-radius:4px;">🎬 Export MP4</button>
<div id="export-status" style="position:fixed;bottom:60px;right:20px;z-index:20;background:rgba(0,0,0,0.85);color:#0f0;border:1px solid #0f0;padding:10px 16px;font:13px monospace;border-radius:4px;display:none;max-width:500px;white-space:pre-wrap;"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const text1Line1 = 'OPENCRABS';
const text1Line2 = 'P R E S E N T S';
const text2 = 'v0.3.15 JUST DROPPED';
const text3Line1 = 'DOWNLOAD NOW';
const text3Line2 = 'www.opencrabs.com';
const highlights = [
    ['🦙', 'Ollama native', 'first-class provider, zero config'],
    ['⌨️', 'OpenCode CLI', 'native provider with streaming'],
    ['💬', '/btw command', 'parallel sub-agents for side tasks'],
    ['🔍', 'browser_find', 'CSS, XPath, text, aria selectors'],
    ['🧠', 'Append-only brains', 'RSI can never erase your memory'],
    ['🔄', 'Upstream template sync', 'auto-pull latest brain files'],
    ['👋', 'Onboarding welcome', 'first-run interactive setup flow'],
    ['📁', 'Recent file memory', 'remembers what you worked on'],
    ['🛡️', 'Bash hardening', 'safer shell execution defaults'],
    ['🔒', 'Queue isolation', 'per-session message queues'],
    ['🧪', '2,479 tests', '+334 from last release']
];
const noiseCanvas = document.createElement('canvas');
const nctx = noiseCanvas.getContext('2d');

function renderNoise(intensity) {
    noiseCanvas.width = W; noiseCanvas.height = H;
    const imgData = nctx.createImageData(W, H);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255 * intensity;
        d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
    }
    nctx.putImageData(imgData, 0, 0);
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

function drawText(text, alpha, tremble, fontSize) {
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(Math.random() * tremble - tremble/2, Math.random() * tremble - tremble/2);

    const textCanvas = document.createElement('canvas');
    textCanvas.width = W; textCanvas.height = H;
    const tctx = textCanvas.getContext('2d');
    tctx.font = `900 ${fontSize}px monospace`;
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.fillStyle = '#fff';
    tctx.fillText(text, W/2, H/2);

    const tData = tctx.getImageData(0, 0, W, H);
    const td = tData.data;
    for (let i = 0; i < td.length; i += 4) {
        if (td[i] > 128) {
            const grain = Math.random() * 60 + 140;
            td[i] = td[i+1] = td[i+2] = grain;
        } else {
            td[i+3] = 0;
        }
    }
    tctx.putImageData(tData, 0, 0);

    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 15;
    ctx.drawImage(textCanvas, 0, 0);

    if (alpha > 0.5) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.shadowBlur = 0;
        const offset = (1 - alpha) * 8 + 2;
        ctx.drawImage(textCanvas, -offset, 0);
        ctx.drawImage(textCanvas, offset, 0);
    }
    ctx.restore();
}

function drawTwoLineText(line1, line2, alpha, tremble, fontSize) {
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(Math.random() * tremble - tremble/2, Math.random() * tremble - tremble/2);

    const textCanvas = document.createElement('canvas');
    textCanvas.width = W; textCanvas.height = H;
    const tctx = textCanvas.getContext('2d');
    tctx.font = `900 ${fontSize}px monospace`;
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.fillStyle = '#fff';
    const lineGap = fontSize * 1.3;
    tctx.fillText(line1, W/2, H/2 - lineGap/2);
    tctx.fillText(line2, W/2, H/2 + lineGap/2);

    const tData = tctx.getImageData(0, 0, W, H);
    const td = tData.data;
    for (let i = 0; i < td.length; i += 4) {
        if (td[i] > 128) {
            const grain = Math.random() * 60 + 140;
            td[i] = td[i+1] = td[i+2] = grain;
        } else {
            td[i+3] = 0;
        }
    }
    tctx.putImageData(tData, 0, 0);

    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 15;
    ctx.drawImage(textCanvas, 0, 0);

    if (alpha > 0.5) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.shadowBlur = 0;
        const offset = (1 - alpha) * 8 + 2;
        ctx.drawImage(textCanvas, -offset, 0);
        ctx.drawImage(textCanvas, offset, 0);
    }
    ctx.restore();
}

function drawTitleSubtitle(title, subtitle, alpha, tremble, titleSize, subtitleSize) {
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(Math.random() * tremble - tremble/2, Math.random() * tremble - tremble/2);

    const textCanvas = document.createElement('canvas');
    textCanvas.width = W; textCanvas.height = H;
    const tctx = textCanvas.getContext('2d');
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    tctx.fillStyle = '#fff';
    const gap = titleSize * 0.9;

    tctx.font = `900 ${titleSize}px monospace`;
    tctx.fillText(title, W/2, H/2 - gap/2);

    tctx.font = `400 ${subtitleSize}px monospace`;
    tctx.fillText(subtitle, W/2, H/2 + gap/2);

    const tData = tctx.getImageData(0, 0, W, H);
    const td = tData.data;
    for (let i = 0; i < td.length; i += 4) {
        if (td[i] > 128) {
            const grain = Math.random() * 60 + 140;
            td[i] = td[i+1] = td[i+2] = grain;
        } else {
            td[i+3] = 0;
        }
    }
    tctx.putImageData(tData, 0, 0);

    ctx.shadowColor = 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 15;
    ctx.drawImage(textCanvas, 0, 0);

    if (alpha > 0.5) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.shadowBlur = 0;
        const offset = (1 - alpha) * 8 + 2;
        ctx.drawImage(textCanvas, -offset, 0);
        ctx.drawImage(textCanvas, offset, 0);
    }
    ctx.restore();
}

function drawGridText(items, alpha, tremble, t) {
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(Math.random() * tremble - tremble/2, Math.random() * tremble - tremble/2);

    const textCanvas = document.createElement('canvas');
    textCanvas.width = W; textCanvas.height = H;
    const tctx = textCanvas.getContext('2d');

    const iconSize = Math.min(W * 0.045, 56);
    const titleSize = Math.min(W * 0.032, 40);
    const descSize = Math.min(W * 0.022, 28);
    const lineH = Math.max(iconSize * 2.4, titleSize * 3.2);
    const scrollH = items.length * lineH;
    const cycleT = (t - start) % CYCLE;
    const scrollY = H - ((cycleT / CYCLE - 0.54) / 0.21) * (scrollH + H * 0.4);

    // Calculate max width for centering
    let maxWidth = 0;
    for (let i = 0; i < items.length; i++) {
        tctx.font = `700 ${titleSize}px monospace`;
        const tw = tctx.measureText(items[i][1]).width;
        tctx.font = `400 ${descSize}px monospace`;
        const dw = tctx.measureText(items[i][2]).width;
        const total = iconSize * 1.3 + Math.max(tw, dw);
        if (total > maxWidth) maxWidth = total;
    }
    const cx = (W - maxWidth) / 2;

    for (let i = 0; i < items.length; i++) {
        const cy = scrollY + i * lineH;
        if (cy < -lineH || cy > H + lineH) continue;

        tctx.fillStyle = '#fff';
        tctx.font = `900 ${iconSize}px monospace`;
        tctx.textAlign = 'left';
        tctx.textBaseline = 'top';
        tctx.fillText(items[i][0], cx, cy);

        tctx.font = `700 ${titleSize}px monospace`;
        tctx.fillText(items[i][1], cx + iconSize * 1.3, cy);

        tctx.font = `400 ${descSize}px monospace`;
        tctx.fillStyle = 'rgba(255,255,255,0.6)';
        tctx.fillText(items[i][2], cx + iconSize * 1.3, cy + titleSize * 1.3);
    }

    const tData = tctx.getImageData(0, 0, W, H);
    const td = tData.data;
    for (let i = 0; i < td.length; i += 4) {
        if (td[i] > 128) {
            const grain = Math.random() * 60 + 140;
            td[i] = td[i+1] = td[i+2] = grain;
        } else {
            td[i+3] = 0;
        }
    }
    tctx.putImageData(tData, 0, 0);

    ctx.shadowColor = 'rgba(255,255,255,0.4)';
    ctx.shadowBlur = 12;
    ctx.drawImage(textCanvas, 0, 0);

    if (alpha > 0.5) {
        ctx.globalAlpha = alpha * 0.25;
        ctx.shadowBlur = 0;
        const offset = (1 - alpha) * 6 + 2;
        ctx.drawImage(textCanvas, -offset, 0);
        ctx.drawImage(textCanvas, offset, 0);
    }
    ctx.restore();
}

const CYCLE = 36000;
var start = null; // var so it's on window for export
const audio = document.getElementById('sfx');
const overlay = document.getElementById('start-overlay');
audio.addEventListener('loadeddata', () => console.log('Audio loaded:', audio.duration.toFixed(1) + 's'));
audio.addEventListener('error', () => console.error('Audio failed to load'));
audio.load();

overlay.addEventListener('click', () => {
    overlay.style.display = 'none';
    audio.currentTime = 0;
    audio.play().catch(e => console.warn('Audio play failed:', e));
    start = performance.now();
    requestAnimationFrame(draw);
});

audio.addEventListener('ended', () => {
    audio.currentTime = 0;
    audio.play();
});

function draw(t) {
    if (!start) return;
    const cycle = (t - start) % CYCLE;
    const phase = cycle / CYCLE;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    let noiseLevel = 1;
    let activeText = null;
    let activeTitleSubtitle = false;
    let activeTwoLine = false;
    let activeGrid = false;
    let textAlpha = 0;
    let textTremble = 0;
    let fontSize = Math.min(W * 0.1, 120);
    let subtitleSize = Math.min(W * 0.04, 48);

    // Phase 1: OPENCRABS / PRESENTS... (0s - 9s)
    if (phase < 0.040) {
        noiseLevel = 1;
    } else if (phase < 0.100) {
        const p = (phase - 0.040) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeTitleSubtitle = true;
        textAlpha = e;
        textTremble = (1 - e) * 15;
        fontSize = Math.min(W * 0.1, 120);
        subtitleSize = Math.min(W * 0.04, 48);
    } else if (phase < 0.190) {
        noiseLevel = 0.15;
        activeTitleSubtitle = true;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
        fontSize = Math.min(W * 0.1, 120);
        subtitleSize = Math.min(W * 0.04, 48);
    } else if (phase < 0.250) {
        const p = (phase - 0.190) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeTitleSubtitle = true;
        textAlpha = 1 - e;
        textTremble = e * 20;
        fontSize = Math.min(W * 0.1, 120);
        subtitleSize = Math.min(W * 0.04, 48);
    }
    // Phase 2: v0.3.14 JUST DROPPED (9s - 18s)
    else if (phase < 0.290) {
        noiseLevel = 1;
    } else if (phase < 0.350) {
        const p = (phase - 0.290) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeText = text2;
        textAlpha = e;
        textTremble = (1 - e) * 15;
        fontSize = Math.min(W * 0.07, 80);
    } else if (phase < 0.440) {
        noiseLevel = 0.15;
        activeText = text2;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
        fontSize = Math.min(W * 0.07, 80);
    } else if (phase < 0.500) {
        const p = (phase - 0.440) / 0.060;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeText = text2;
        textAlpha = 1 - e;
        textTremble = e * 20;
        fontSize = Math.min(W * 0.07, 80);
    }
    // Phase 3: Highlights grid (18s - 30s) — extended for 11 items
    else if (phase < 0.540) {
        noiseLevel = 1;
    } else if (phase < 0.590) {
        const p = (phase - 0.540) / 0.050;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeGrid = true;
        textAlpha = e;
        textTremble = (1 - e) * 15;
    } else if (phase < 0.770) {
        noiseLevel = 0.15;
        activeGrid = true;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
    } else if (phase < 0.820) {
        const p = (phase - 0.770) / 0.050;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeGrid = true;
        textAlpha = 1 - e;
        textTremble = e * 20;
    }
    // Phase 4: Get it now / www.opencrabs.com (30s - 36s)
    else if (phase < 0.860) {
        noiseLevel = 1;
    } else if (phase < 0.900) {
        const p = (phase - 0.860) / 0.040;
        const e = easeInOut(p);
        noiseLevel = 1 - e * 0.85;
        activeTwoLine = true;
        textAlpha = e;
        textTremble = (1 - e) * 15;
        fontSize = Math.min(W * 0.07, 80);
    } else if (phase < 0.960) {
        noiseLevel = 0.15;
        activeTwoLine = true;
        textAlpha = 1;
        textTremble = Math.sin(t / 100) * 2;
        fontSize = Math.min(W * 0.07, 80);
    } else {
        const p = (phase - 0.960) / 0.040;
        const e = easeInOut(p);
        noiseLevel = 0.15 + e * 0.85;
        activeTwoLine = true;
        textAlpha = 1 - e;
        textTremble = e * 20;
        fontSize = Math.min(W * 0.07, 80);
    }

    renderNoise(noiseLevel);
    ctx.drawImage(noiseCanvas, 0, 0);

    if (activeGrid) {
        drawGridText(highlights, textAlpha, textTremble, t);
    } else if (activeTitleSubtitle) {
        drawTitleSubtitle(text1Line1, text1Line2, textAlpha, textTremble, fontSize, subtitleSize);
    } else if (activeTwoLine) {
        drawTwoLineText(text3Line1, text3Line2, textAlpha, textTremble, fontSize);
    } else if (activeText) {
        drawText(activeText, textAlpha, textTremble, fontSize);
    }

    for (let y = 0; y < H; y += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, y, W, 2);
    }

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    const grad = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, W*0.8);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    if (Math.random() < 0.05) {
        const gy = Math.random() * H;
        const gh = Math.random() * 40 + 10;
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(0, gy, W, gh);
    }

    requestAnimationFrame(draw);
}
// ── Export MP4 button ──
const exportBtn = document.getElementById('export-btn');
const exportStatus = document.getElementById('export-status');

function showStatus(msg) {
    exportStatus.style.display = 'block';
    exportStatus.textContent = msg;
}

exportBtn.addEventListener('click', async () => {
    exportBtn.disabled = true;
    exportBtn.textContent = '⏳ Recording...';

    // Capture canvas video
    const videoStream = canvas.captureStream(60);

    // Capture audio via AudioContext (works with local files)
    const audioCtx = new AudioContext();
    const audioEl = document.getElementById('sfx');
    const source = audioCtx.createMediaElementSource(audioEl);
    const dest = audioCtx.createMediaStreamDestination();
    source.connect(dest);
    source.connect(audioCtx.destination); // keep playing through speakers

    const combinedStream = new MediaStream([
        ...videoStream.getVideoTracks(),
        ...dest.stream.getAudioTracks()
    ]);

    const recorder = new MediaRecorder(combinedStream, {
        mimeType: 'video/webm;codecs=vp9,opus',
        videoBitsPerSecond: 8000000
    });
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
        audioCtx.close();
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'opencrabs-v0.3.15-export.webm';
        a.click();
        URL.revokeObjectURL(url);
        exportBtn.disabled = false;
        exportBtn.textContent = '🎬 Export MP4';
        showStatus(`✅ WebM saved with audio!\n\nTo convert to MP4:\nffmpeg -i opencrabs-v0.3.15-export.webm -c:v copy -c:a aac opencrabs-v0.3.15.mp4`);
        setTimeout(() => { exportStatus.style.display = 'none'; }, 30000);
    };

    // Reset audio to start of export
    audioEl.currentTime = 0;
    audioEl.play().catch(() => {});

    recorder.start();
    showStatus('🎬 Recording one cycle (~37s)...');

    // Stop after 37 seconds (animation cycle is 36s + 1s buffer)
    setTimeout(() => { recorder.stop(); }, 37000);
});


// Export: render a single frame at given timestamp (bypasses rAF)
window.renderFrameAt = function(t) {
    if (!start) start = t;
    draw(t);
};
requestAnimationFrame(draw);
</script>
</body>
</html>
