<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 3 - Features</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Press Start 2P', monospace; }
canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
#bg { z-index: 1; }
#main { z-index: 2; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="main"></canvas>
<script>
const DURATION = 14;
const features = [
  ['⚡', 'OpenRouter Cache', 'Zero cost for identical requests'],
  ['🔀', 'Provider Reliability', 'Sticky fallbacks + per-session isolation'],
  ['📡', 'Streaming Resilience', 'TCP keepalive + partial JSON repair'],
  ['🧠', 'Context Leak Plugged', 'Claude CLI compaction owned, no more 242%'],
  ['📺', 'Channel Display Clean', 'Slack/Telegram/Discord show clean text'],
  ['🗜️', 'Compaction Restored', 'Synchronous + 50KB tool result cap'],
  ['🛡️', 'Self-Heal Smarter', 'Phantom detectors + RSI escalation'],
  ['🎮', 'Skills System', '4 built-in skills + help screen section'],
  ['🔒', 'Security', 'CodeQL #62 cleared, session_ids safe'],
  ['🧩', 'Session Isolation', 'Per-session context windows, no cross-contam']
];

const bgCanvas = document.getElementById('bg');
const mainCanvas = document.getElementById('main');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');
let W, H;

function resize() {
    W = window.W || window.innerWidth; H = window.H || window.innerHeight;
    bgCanvas.width = W; bgCanvas.height = H;
    mainCanvas.width = W; mainCanvas.height = H;
}
resize();
window.resize = resize;
window.addEventListener('resize', resize);

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function drawCircuitGrid(t) {
    bgCtx.fillStyle = '#0D3D4B';
    bgCtx.fillRect(0, 0, W, H);
    const gridSize = 40;
    bgCtx.strokeStyle = 'rgba(0,212,170,0.08)';
    bgCtx.lineWidth = 1;
    for (let x = 0; x < W; x += gridSize) {
        bgCtx.beginPath(); bgCtx.moveTo(x, 0); bgCtx.lineTo(x, H); bgCtx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
        bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(W, y); bgCtx.stroke();
    }
    bgCtx.strokeStyle = 'rgba(0,212,170,0.12)';
    bgCtx.lineWidth = 2;
    const offset = (t * 20) % gridSize;
    for (let i = 0; i < 4; i++) {
        const y = H * 0.15 + i * H * 0.2 + offset;
        bgCtx.beginPath();
        bgCtx.moveTo(0, y);
        bgCtx.lineTo(W * 0.25, y);
        bgCtx.lineTo(W * 0.25 + 20, y - 20);
        bgCtx.lineTo(W * 0.75, y - 20);
        bgCtx.lineTo(W * 0.75 + 20, y);
        bgCtx.lineTo(W, y);
        bgCtx.stroke();
    }
    bgCtx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let y = 0; y < H; y += 3) bgCtx.fillRect(0, y, W, 1);
}

function drawPixelRect(x, y, w, h, color, borderWidth) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
    if (borderWidth) {
        ctx.strokeStyle = '#00d4aa';
        ctx.lineWidth = borderWidth;
        ctx.strokeRect(x, y, w, h);
    }
}

function drawFrame(t) {
    ctx.clearRect(0, 0, W, H);
    drawCircuitGrid(t);

    // LEFT SIDE: Box art image
    if (window.imageReady && boxImg && boxImg.complete && boxImg.naturalWidth > 0) {
        const boxW = Math.min(W * 0.28, 280);
        const boxH = boxW * 1.5;
        const boxX = W * 0.06;
        const boxY = H * 0.5 - boxH / 2 + Math.sin(t * 0.4) * 6;

        // Pixel shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(boxX + 6, boxY + 6, boxW, boxH);

        ctx.drawImage(boxImg, boxX, boxY, boxW, boxH);
        ctx.strokeStyle = '#00d4aa';
        ctx.lineWidth = 3;
        ctx.strokeRect(boxX - 2, boxY - 2, boxW + 4, boxH + 4);
    }

    // RIGHT SIDE: Pop-out tab with features (Game Boy manual style)
    const tabSlide = easeOutCubic(Math.min(t / 0.8, 1));
    const tabW = Math.min(W * 0.50, 580);
    const tabH = H * 0.60;
    const tabX = W * 0.44 - (1 - tabSlide) * W * 0.1;
    const tabY = H * 0.22;

    // Tab background (dark charcoal like the manual insert)
    ctx.fillStyle = '#1E2021';
    ctx.fillRect(tabX, tabY, tabW, tabH);

    // Pixel border with stepped shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(tabX + 4, tabY + 4, tabW, tabH);
    ctx.fillStyle = '#1E2021';
    ctx.fillRect(tabX, tabY, tabW, tabH);
    ctx.strokeStyle = '#00d4aa';
    ctx.lineWidth = 2;
    ctx.strokeRect(tabX, tabY, tabW, tabH);

    // Orange header bar
    ctx.fillStyle = '#C86F22';
    ctx.fillRect(tabX, tabY, tabW, 36);
    ctx.fillStyle = '#fff';
    const headerSize = Math.min(W * 0.012, 14);
    ctx.font = `700 ${headerSize}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('FEATURES:', tabX + 16, tabY + 18);

    // Feature list
    const listStartY = tabY + 52;
    const iconS = Math.min(W * 0.018, 22);
    const titleS = Math.min(W * 0.011, 13);
    const descS = Math.min(W * 0.008, 10);
    const lineH = iconS * 2.6;

    for (let i = 0; i < features.length; i++) {
        const y = listStartY + i * lineH;
        if (y > tabY + tabH - 20) break;

        const itemDelay = 0.6 + i * 0.25;
        const itemA = Math.min(1, Math.max(0, (t - itemDelay) / 0.3));
        if (itemA <= 0) continue;

        ctx.globalAlpha = tabSlide * itemA;

        // Icon
        ctx.fillStyle = '#fff';
        ctx.font = `${iconS}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'left';
        ctx.fillText(features[i][0], tabX + 16, y);

        // Title in orange
        ctx.fillStyle = '#C86F22';
        ctx.font = `700 ${titleS}px 'Press Start 2P', monospace`;
        ctx.fillText(features[i][1], tabX + 16 + iconS * 1.6, y);

        // Description in dim white
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = `400 ${descS}px 'Press Start 2P', monospace`;
        ctx.fillText(features[i][2], tabX + 16 + iconS * 1.6, y + titleS * 1.4);
    }

    // Quote bubble — inside the tab area at bottom, above the bottom bar
    if (t > 3.5) {
        const bubbleA = easeOutCubic(Math.min((t - 3.5) / 0.5, 1));
        ctx.globalAlpha = bubbleA;

        const bubW = Math.min(W * 0.32, 380);
        const bubH = 56;
        const bubX = W/2 - bubW/2;
        const bubY = tabY + tabH - bubH - 12;

        // Stepped pixel shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(bubX + 3, bubY + 3, bubW, bubH);

        // Bubble body (dark teal)
        ctx.fillStyle = '#0D3D4B';
        ctx.fillRect(bubX, bubY, bubW, bubH);
        ctx.strokeStyle = '#7FFFD4';
        ctx.lineWidth = 2;
        ctx.strokeRect(bubX, bubY, bubW, bubH);

        // Tail pointing up (pixel style) — centered
        const tailX = bubX + bubW/2;
        ctx.fillStyle = '#0D3D4B';
        ctx.fillRect(tailX - 6, bubY - 10, 12, 10);
        ctx.strokeStyle = '#7FFFD4';
        ctx.beginPath();
        ctx.moveTo(tailX - 6, bubY);
        ctx.lineTo(tailX, bubY - 10);
        ctx.lineTo(tailX + 6, bubY);
        ctx.stroke();

        // Quote text
        const qSize = Math.min(W * 0.007, 9);
        ctx.font = `400 ${qSize}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.fillText('"I can\'t believe it\'s', bubX + bubW/2, bubY + 20);
        ctx.fillText('just one binary!"', bubX + bubW/2, bubY + 36);
    }

    // "WHAT'S NEW v0.3.17" header — top-left corner, above the tab
    if (t > 0.2) {
        const hdrA = easeOutCubic(Math.min((t - 0.2) / 0.4, 1));
        ctx.globalAlpha = hdrA;
        const hdrSize = Math.min(W * 0.014, 16);
        ctx.font = `900 ${hdrSize}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'left';
        ctx.shadowColor = '#7FFFD4';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#7FFFD4';
        ctx.fillText('WHAT\'S NEW', tabX, tabY - 24);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#C86F22';
        const subHdrSize = Math.min(W * 0.011, 13);
        ctx.font = `700 ${subHdrSize}px 'Press Start 2P', monospace`;
        ctx.fillText('v0.3.17', tabX + ctx.measureText('WHAT\'S NEW').width + 16, tabY - 24);
    }

    // Bottom bar: 44 commits badge — below everything, clean spacing
    if (t > 2.5) {
        const badgeA = easeOutCubic(Math.min((t - 2.5) / 0.4, 1));
        ctx.globalAlpha = badgeA;

        const badgeW = Math.min(W * 0.35, 400);
        const badgeH = 30;
        const badgeX = W/2 - badgeW/2;
        const badgeY = H * 0.90;

        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(badgeX + 3, badgeY + 3, badgeW, badgeH);
        ctx.fillStyle = '#1E2021';
        ctx.fillRect(badgeX, badgeY, badgeW, badgeH);
        ctx.strokeStyle = '#00d4aa';
        ctx.lineWidth = 2;
        ctx.strokeRect(badgeX, badgeY, badgeW, badgeH);

        const bSize = Math.min(W * 0.008, 10);
        ctx.font = `700 ${bSize}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.fillText('44 COMMITS  •  28 FIXES  •  7 FEATURES', W/2, badgeY + badgeH/2);
    }

    ctx.globalAlpha = 1;
}

window.imageReady = false;

const boxImg = new Image();
boxImg.id = 'boxImg';
boxImg.src = 'assets/retro-game-opencrabs.png';
boxImg.onload = () => { window.imageReady = true; };
boxImg.onerror = () => { window.imageReady = false; };

// Export-driven rendering: export script calls window.renderFrame(t) with exact time
window.renderFrame = function(t) {
    drawFrame(Math.min(t, DURATION));
};
window.DURATION = DURATION;
</script>
</body>
</html>
